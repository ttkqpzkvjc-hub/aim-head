<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIM HEAD</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  background:#0b001a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

#splash{
  text-align:center;
}

#login{
  display:none;
  flex-direction:column;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:purple;
  color:white;
}
</style>
</head>

<body>

<div id="splash">
  <h1>🚀 AIM HEAD</h1>
</div>

<div id="login">
  <h2>Login</h2>
  <input type="text" placeholder="Digite a key">
  <button onclick="entrar()">Entrar</button>
</div>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("login").style.display="flex";
},2000);

function entrar(){
  alert("Painel liberado 🔥");
}
</script>

</body>
</html>
